<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror — A Self-Narrative OS</title>
    <meta
      name="description"
      content="Mirror is a Self-Narrative OS for observing how you interpret reality."
    />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }
      body {
        font-family: Georgia, "Times New Roman", serif;
        background: #f8f4ef;
        color: #1c1916;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        max-width: 720px;
        width: 100%;
      }
      h1 {
        font-size: clamp(56px, 10vw, 96px);
        font-weight: 300;
        margin: 0 0 16px;
        line-height: 1;
      }
      p {
        margin: 0;
        font-size: clamp(18px, 2.4vw, 26px);
        line-height: 1.6;
        max-width: 26ch;
      }
      a {
        display: inline-block;
        margin-top: 28px;
        padding: 14px 22px;
        border-radius: 999px;
        background: #1c1916;
        color: #f8f4ef;
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mirror</h1>
      <p>We don't live in the world itself. We live in our interpretation of it.</p>
      <a href="/app">Enter Mirror</a>
    </main>
  </body>
</html>
