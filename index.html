<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror — A Self-Narrative OS</title>
    <meta
      name="description"
      content="Mirror is a Self-Narrative OS for observing how you interpret reality."
    />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        background: #f8f4ef;
        color: #1c1916;
        font-family: Georgia, 'Times New Roman', serif;
      }
      main { max-width: 720px; width: 100%; }
      h1 { margin: 0 0 16px; font-size: clamp(56px, 10vw, 96px); font-weight: 300; line-height: 1; }
      p { margin: 0; max-width: 26ch; font-size: clamp(18px, 2.4vw, 26px); line-height: 1.6; }
      a {
        display: inline-block; margin-top: 28px; padding: 14px 22px; border-radius: 999px;
        background: #1c1916; color: #f8f4ef; text-decoration: none; font-size: 14px;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
